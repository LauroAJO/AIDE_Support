name = "aide-cron"
main = "worker.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 8 * * *"]   # Diariamente às 08:00 UTC (10:00 hora NL no verão)

# Standalone Worker (NÃO Pages) — o Pages não suporta [triggers].
# Secrets (Cloudflare Dashboard → Workers → aide-cron → Settings → Variables):
#   CRON_SECRET = "mesma-string-definida no Pages aide-support"
[vars]
AIDE_URL = "https://aide-support.pages.dev"
