name = "aide-support"
pages_build_output_dir = "dist"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "aide-db"
database_id = "71f9338d-8664-4df1-8384-86ba8c256de9"

[[kv_namespaces]]
binding = "AIDE_TOKENS"
id = "7c9e215fee7e4b9fa97bb1def4536e8a"

[[kv_namespaces]]
binding = "AIDE_SYNC"
id = "5afa763feac346398319c34996a85d31"

# Env vars and secrets are NOT defined here (this file is committed to a public
# repo). Production values live in the Cloudflare Pages dashboard / `wrangler
# pages secret put`; local values go in .dev.vars (git-ignored). See
# .dev.vars.example. The worker derives GOOGLE_REDIRECT_URI from the request
# origin when it isn't set, so production needs no redirect var at all.
