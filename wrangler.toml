name = "aide-support"
pages_build_output_dir = "dist"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "aide-db"
database_id = "71f9338d-8664-4df1-8384-86ba8c256de9"

# KV namespaces (AIDE_TOKENS, AIDE_SYNC) were unbound in v2.0.0 — the worker
# no longer reads or writes KV. The namespaces themselves still exist in the
# Cloudflare account and can be re-bound later if needed.

# Secrets (GOOGLE_CLIENT_ID/SECRET, ALLOWED_EMAILS, OWNER_EMAIL, VAPID_PUBLIC_KEY,
# VAPID_PRIVATE_KEY) are NOT defined here (public repo). They live in the
# Cloudflare Pages dashboard / `wrangler pages secret put`; local values go in
# .dev.vars (git-ignored). GOOGLE_REDIRECT_URI is derived from the request
# origin in production. Only non-sensitive vars belong below.

[vars]
VAPID_SUBJECT = "mailto:lauro.ajo@gmail.com"
